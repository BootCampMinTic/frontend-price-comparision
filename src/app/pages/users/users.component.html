<div class="content">
  <div class="page-header"><h1>Usuarios</h1>
    <button class="btn btn-primary" (click)="showForm.set(!showForm())">{{ showForm() ? 'Cancelar' : '+ Nuevo Usuario' }}</button>
  </div>

  @if (showForm()) {
    <div class="card"><div class="card-header"><h3>Nuevo Usuario</h3></div>
      <div class="form-grid-3">
        <div><label class="form-label">Nombre</label><input class="form-control" [(ngModel)]="newUser.name" /></div>
        <div><label class="form-label">Password</label><input class="form-control" type="password" [(ngModel)]="newUser.password" /></div>
        <div><label class="form-label">Tipo ID</label><input class="form-control" type="number" [(ngModel)]="newUser.typeUserId" /></div>
      </div>
      <button class="btn btn-success mt-3" (click)="create()">Guardar Usuario</button>
    </div>
  }

  @if (loading()) { <div class="loading">Cargando...</div> }
  @else if (users().length === 0) { <div class="empty-state"><h3>No hay usuarios</h3></div> }
  @else {
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="table table-hover">
        <thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th></tr></thead>
        <tbody>
          @for (u of users(); track u.id) { <tr><td class="text-muted">#{{ u.id }}</td><td class="fw-medium">{{ u.name }}</td><td><span class="badge badge-info">{{ u.typeUserDescription || 'N/A' }}</span></td></tr> }
        </tbody>
      </table>
    </div>
  }
</div>
