<div class="page-header"><h1>Usuarios</h1><button (click)="showForm.set(!showForm())">{{ showForm() ? 'Cancelar' : '+ Nuevo Usuario' }}</button></div>

@if (showForm()) {
  <div class="card">
    <h3>Nuevo Usuario</h3>
    <div class="form-row">
      <div class="form-group"><label>Nombre</label><input [(ngModel)]="newUser.name" /></div>
      <div class="form-group"><label>Password</label><input type="password" [(ngModel)]="newUser.password" /></div>
      <div class="form-group"><label>Tipo ID</label><input type="number" [(ngModel)]="newUser.typeUserId" /></div>
    </div>
    <button class="success" (click)="create()">Guardar</button>
  </div>
}

@if (loading()) { <p class="loading">Cargando...</p> }
@else if (users().length === 0) { <p class="empty">No hay usuarios</p> }
@else {
  <div class="card">
    <table>
      <thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th></tr></thead>
      <tbody>
        @for (u of users(); track u.id) { <tr><td>{{ u.id }}</td><td>{{ u.name }}</td><td><span class="badge badge-blue">{{ u.typeUserDescription }}</span></td></tr> }
      </tbody>
    </table>
  </div>
}
