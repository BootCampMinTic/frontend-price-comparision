<div class="content">
  <div class="page-header"><h1>Dashboard</h1></div>

  <div class="stats-grid">
    <a routerLink="/stores" class="stat-card"><div class="stat-number">{{ stores() }}</div><div class="stat-label">Tiendas</div></a>
    <a routerLink="/products" class="stat-card"><div class="stat-number">{{ products() }}</div><div class="stat-label">Productos</div></a>
    <a routerLink="/sales" class="stat-card"><div class="stat-number">{{ sales() }}</div><div class="stat-label">Ventas</div></a>
    <a routerLink="/users" class="stat-card"><div class="stat-number">{{ users() }}</div><div class="stat-label">Usuarios</div></a>
  </div>

  <div class="card">
    <div class="card-header"><h3>Bienvenido a Price Comparison</h3></div>
    <p style="color:#6c757d;">Sistema de comparación de precios entre tiendas. Usa el menú lateral para gestionar tiendas, productos, ventas, usuarios y clientes.</p>
    <div style="margin-top:1rem;display:flex;gap:0.5rem;">
      <a routerLink="/stores" class="btn btn-primary">Ver Tiendas</a>
      <a routerLink="/products" class="btn btn-outline-primary">Ver Productos</a>
    </div>
  </div>
</div>
