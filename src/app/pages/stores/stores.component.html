<app-page-header title="Tiendas" subtitle="Gestion de establecimientos" createLabel="Nueva tienda" (create)="openCreate()" />

@if (loading() && stores().length === 0) {
  <p-card><p-progressSpinner /></p-card>
} @else if (!loading() && stores().length === 0) {
  <app-empty-state
    icon="pi pi-shop"
    title="No hay tiendas"
    description="Crea la primera tienda para empezar"
    actionLabel="Nueva tienda"
    (action)="openCreate()" />
} @else {
  <p-card>
    <p-table
      [value]="stores()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 25]"
      sortField="name"
      [sortOrder]="1"
      styleClass="p-datatable-sm"
      responsiveLayout="scroll">
      <ng-template #header>
        <tr>
          <th pSortableColumn="id">ID <p-sortIcon field="id" /></th>
          <th pSortableColumn="name">Nombre <p-sortIcon field="name" /></th>
          <th pSortableColumn="address">Direccion <p-sortIcon field="address" /></th>
          <th>Telefono</th>
          <th>Categoria</th>
          <th style="width: 8rem;">Acciones</th>
        </tr>
      </ng-template>
      <ng-template #body let-store>
        <tr>
          <td>{{ store.id }}</td>
          <td><strong>{{ store.name }}</strong></td>
          <td>{{ store.address }}</td>
          <td>{{ store.phone || '-' }}</td>
          <td><p-tag [value]="getCategoryName(store.categoryStoreId)" severity="info" /></td>
          <td>
            <div style="display: flex; gap: 0.25rem;">
              <p-button icon="pi pi-pencil" severity="secondary" variant="text" size="small" rounded (onClick)="openEdit(store)" />
              <p-button icon="pi pi-trash" severity="danger" variant="text" size="small" rounded (onClick)="confirmDelete(store)" />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
}

<p-dialog
  [header]="isEditing() ? 'Editar tienda' : 'Nueva tienda'"
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [modal]="true"
  [style]="{ width: '500px' }">
  <div class="form-grid" style="margin-bottom: 1rem;">
    <div>
      <label class="form-label">Nombre</label>
      <input pInputText [(ngModel)]="form.name" class="w-full" />
    </div>
    <div>
      <label class="form-label">Telefono</label>
      <input pInputText [(ngModel)]="form.phone" class="w-full" />
    </div>
  </div>
  <div style="margin-bottom: 1.5rem;">
    <label class="form-label">Direccion</label>
    <input pInputText [(ngModel)]="form.address" class="w-full" />
  </div>
  <div>
    <label class="form-label">Categoria</label>
    <p-select [options]="categoryOptions" [(ngModel)]="form.categoryStoreId" class="w-full" />
  </div>
  <ng-template #footer>
    <p-button label="Cancelar" severity="secondary" variant="text" (onClick)="dialogVisible.set(false)" />
    <p-button [label]="isEditing() ? 'Guardar' : 'Crear'" (onClick)="save()" [disabled]="!form.name || !form.address" />
  </ng-template>
</p-dialog>
