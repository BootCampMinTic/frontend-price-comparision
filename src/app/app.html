<div class="layout">
  <nav class="sidebar">
    <h2>Precios</h2>
    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }">
        <span class="icon">{{ item.icon }}</span>
        {{ item.label }}
      </a>
    }
  </nav>
  <main class="content">
    <router-outlet />
  </main>
</div>
