<div class="app-layout">
  <app-sidebar [items]="navItems" [open]="sidebarOpen" (toggleSidebar)="toggleSidebar()" />

  <div class="main-content">
    <p-toolbar>
      <ng-template #start>
        <p-button
          icon="pi pi-bars"
          severity="secondary"
          variant="text"
          (onClick)="toggleSidebar()"
          class="sidebar-toggle" />
      </ng-template>
    </p-toolbar>

    <div class="content-area">
      <router-outlet />
    </div>
  </div>
</div>

<p-toast />
<p-confirmDialog />
